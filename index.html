<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radar BCN - LIVE</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0f172a; color: white; padding: 20px; margin: 0; }
        .container { max-width: 500px; margin: auto; }
        .clock-box { text-align: center; background: #1e293b; padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #334155; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        #reloj { font-size: 2.5em; color: #38bdf8; font-weight: 800; font-family: monospace; }
        .card { background: #1e293b; border-radius: 12px; padding: 16px; margin-bottom: 12px; border-left: 6px solid #3b82f6; display: flex; justify-content: space-between; align-items: center; }
        .flight-code { font-size: 1.4em; font-weight: bold; color: #f8fafc; }
        .status-badge { background: #064e3b; color: #34d399; padding: 4px 8px; border-radius: 6px; font-size: 0.75em; font-weight: bold; text-transform: uppercase; }
        .info { color: #94a3b8; font-size: 0.9em; margin-top: 4px; }
        .btn { width: 100%; padding: 16px; background: #3b82f6; color: white; border: none; border-radius: 10px; font-weight: bold; font-size: 1em; cursor: pointer; transition: background 0.2s; }
        .btn:active { background: #2563eb; }
        #log-terminal { background: #000; color: #10b981; font-size: 0.75em; padding: 12px; border-radius: 8px; margin-top: 20px; font-family: monospace; border: 1px solid #1e293b; height: 80px; overflow-y: auto; }
    </style>
</head>
<body>

    <div class="container">
        <div class="clock-box">
            <div style="font-size: 0.8em; color: #94a3b8; margin-bottom: 5px;">HORA BARCELONA (UTC+1)</div>
            <div id="reloj">00:00:00</div>
        </div>

        <button class="btn" onclick="buscarVuelos()">🔄 REFRESCAR RADARES</button>

        <div id="lista-vuelos"></div>

        <div id="log-terminal">SISTEMA: Listo para escanear...</div>
    </div>

<script>
    const API_KEY = '691df784a5997fe3db5f4987d14e001b';
    // He priorizado los vuelos que suelen estar activos en esta franja horaria

    function imprimirLog(msg) {
        const log = document.getElementById('log-terminal');
        log.innerHTML += "<br>> " + msg;
        log.scrollTop = log.scrollHeight;
    }

    function actualizarReloj() {
        const ahora = new Date();
        document.getElementById('reloj').innerHTML = ahora.toLocaleTimeString('es-ES', {hour12: false});
        setTimeout(actualizarReloj, 1000);
    }

                    const v = dataRaw.data[0];
                    imprimirLog("Detectado: " + id);

                    if (lista.innerHTML.includes("Escaneando")) lista.innerHTML = "";
